<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>MyHealth Playground - skeleton</title>
    <base href="/" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />
    <link
      rel="stylesheet"
      href="/src/styles.css"
    />

    <script
      type="module"
      src="/src/main.ts"
    ></script>

    <style>
      .skeleton-animations mh-skeleton:not(:first-child) {
        margin-top: 1rem;
      }

      .skeleton-avatars {
        display: flex;
        gap: 0.5rem;
      }
      .skeleton-avatars mh-skeleton {
        width: 3rem;
        --mh-skeleton__height: 3rem;
      }
      .skeleton-avatars mh-skeleton.square {
        --mh-skeleton__border-radius: 0;
      }
      .skeleton-avatars mh-skeleton.circle {
        --mh-skeleton__border-radius: 50%;
      }
    </style>
  </head>

  <body>
    <h2>Skeleton</h2>

    <h3>Animations</h3>
    <div class="skeleton-animations">
      <mh-skeleton animation="none"></mh-skeleton>
      <mh-skeleton animation="sheen"></mh-skeleton>
      <mh-skeleton animation="pulse"></mh-skeleton>
    </div>

    <h3>Paragraphs</h3>
    <!-- A single element renders five rows and announces "Loading" once. -->
    <mh-skeleton
      lang="en"
      animation="sheen"
      count="5"
    ></mh-skeleton>

    <h3>Avatars</h3>
    <div class="skeleton-avatars">
      <mh-skeleton
        class="square"
        animation="sheen"
      ></mh-skeleton>
      <mh-skeleton
        class="circle"
        animation="sheen"
      ></mh-skeleton>
    </div>
  </body>
</html>
