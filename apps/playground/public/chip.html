<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>MyHealth Playground - chip</title>
    <base href="/" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />
    <link
      rel="stylesheet"
      href="/src/styles.css"
    />

    <script
      type="module"
      src="/src/main.ts"
    ></script>
  </head>

  <body>
    <article>
      <h2>Chip</h2>

      <h3>Display chips</h3>
      <mh-display-chip variant="brand">Brand</mh-display-chip>
      <mh-display-chip variant="success">Success</mh-display-chip>
      <mh-display-chip variant="neutral">Neutral</mh-display-chip>
      <mh-display-chip variant="warning">Warning</mh-display-chip>
      <mh-display-chip variant="danger">Danger</mh-display-chip>
      <mh-display-chip variant="tertiary">Tertiary</mh-display-chip>

      <h3>Display chips with icon</h3>
      <mh-display-chip variant="success">
        <mh-icon
          name="check_circle"
          slot="start"
          size="s"
        ></mh-icon>
        Completed
      </mh-display-chip>
      <mh-display-chip variant="warning">
        <mh-icon
          name="warning"
          slot="start"
          size="s"
        ></mh-icon>
        Pending
      </mh-display-chip>
      <mh-display-chip variant="danger">
        <mh-icon
          name="emergency_home"
          slot="start"
          size="s"
        ></mh-icon>
        Urgent
      </mh-display-chip>

      <h3>Selectable chips</h3>
      <mh-selectable-chip>Unselected</mh-selectable-chip>
      <mh-selectable-chip selected>Selected</mh-selectable-chip>
      <mh-selectable-chip disabled>Disabled</mh-selectable-chip>
      <mh-selectable-chip
        selected
        disabled
        >Selected disabled</mh-selectable-chip
      >

      <h3>Removable chips</h3>
      <mh-removable-chip value="amoxicillin">Amoxicillin</mh-removable-chip>
      <mh-removable-chip>
        <mh-icon
          name="person"
          slot="start"
        ></mh-icon>
        Dr. Smith
      </mh-removable-chip>
      <mh-removable-chip disabled>Disabled</mh-removable-chip>

      <script type="module">
        document.addEventListener('mh-chip-selection-change', event => {
          console.log('selection-change', event.target.value, event.selected);
        });
        document.addEventListener('mh-chip-remove', event => {
          console.log('remove', event.value);
          event.target.remove();
        });
      </script>
    </article>
  </body>
</html>
