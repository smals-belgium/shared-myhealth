<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>MyHealth Playground - checkbox</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />

    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/form.ts"></script>
  </head>

  <body>
    <form id="form">
      <h2>Checkbox</h2>
      preferences:
      <mh-checkbox name="prefs" value="all" indeterminate
        >I like everything</mh-checkbox
      >
      <mh-checkbox name="prefs" value="f">I like ladies</mh-checkbox>
      <mh-checkbox name="prefs" value="m" checked>I like gentlemen</mh-checkbox>
      <mh-checkbox name="prefs" value="x" checked disabled
        >I like people who don't know</mh-checkbox
      >

      <footer>
        <mh-button type="submit">submit</mh-button>
        <mh-button type="reset" appearance="outlined">reset</mh-button>
      </footer>
    </form>
  </body>
</html>
