<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>MyHealth Playground - slide-toggle</title>
    <base href="/" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="/favicon.ico"
    />
    <link
      rel="stylesheet"
      href="/src/styles.css"
    />

    <script
      type="module"
      src="/src/main.ts"
    ></script>
    <script
      type="module"
      src="/src/form.ts"
    ></script>
  </head>

  <body>
    <form id="form">
      <h2>Slide Toggle</h2>
      settings:
      <br />
      <mh-slide-toggle
        name="settings"
        value="notifications"
        >Enable notifications</mh-slide-toggle
      >
      <br />
      <mh-slide-toggle
        name="settings"
        value="darkmode"
        checked
        >Dark mode</mh-slide-toggle
      >
      <br />
      <mh-slide-toggle
        style="width: 100%"
        name="settings"
        value="analytics"
        label-position="left"
        >Analytics</mh-slide-toggle
      >
      <br />
      <mh-slide-toggle
        name="settings"
        value="newsletter"
        checked
        disabled
        >Newsletter subscription</mh-slide-toggle
      >
      <br />

      <mh-slide-toggle
        style="width: 100%"
        name="settings"
        value="newsletter"
        disabled
        label-position="left"
        >Newsletter subscription</mh-slide-toggle
      >
      <br />

      <footer>
        <mh-button type="submit">submit</mh-button>
        <mh-button
          type="reset"
          appearance="outlined"
          >reset</mh-button
        >
      </footer>
    </form>
  </body>
</html>
