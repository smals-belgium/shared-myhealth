Angular version: {{ version }}

<mh-a
  appearance="link"
  target="_blank"
  href="https://github.com/smals-belgium/myhealth"
>
  Source code
</mh-a>

<form #form="ngForm">
  <fieldset>
    <legend>checkbox</legend>

    <mh-checkbox
      #cb="ngModel"
      name="cb"
      ngModel
      required
      >check</mh-checkbox
    >
  </fieldset>

  Checkbox value {{ cb.value }}<br />
  Checkbox valid {{ cb.valid }}<br />

  <fieldset>
    <legend>radio</legend>

    <mh-radio
      name="gender"
      value="m"
      ngModel
      required
      >male</mh-radio
    >
    <mh-radio
      name="gender"
      value="f"
      ngModel
      required
      >female</mh-radio
    >
  </fieldset>

  <fieldset>
    <legend>text-input</legend>

    <mh-text-input
      name="textInput"
      ngModel
      required
      minlength="2"
      maxlength="10"
      pattern="\d*"
      help="Mininmum 2 chars, maximum 10, and must be digits"
      hint="But only numbers are valid"
    >
      text
    </mh-text-input>
  </fieldset>

  Form value {{ form.value | json }}<br />
  Form valid {{ form.valid }}<br />
  Form errors {{ errors(form) | json }}

  <footer>
    <mh-button
      type="submit"
      [disabled]="!form.valid"
    >
      Submit
    </mh-button>

    <mh-button
      type="reset"
      appearance="outlined"
    >
      Reset
    </mh-button>
  </footer>
</form>
