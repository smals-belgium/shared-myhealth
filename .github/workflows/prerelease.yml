name: Pre-release

on:
  workflow_dispatch:
    inputs:
      project:
        description: Project to release
        required: true
        type: choice
        options:
          - vitals
          - vitals-ng

permissions:
  contents: read

jobs:
  prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org

    - name: Resolve publish directory
      id: resolve
      run: |
        case "${{ inputs.project }}" in
          vitals)
            echo "dist_dir=packages/vitals" >> $GITHUB_OUTPUT
            ;;
          vitals-ng)
            echo "dist_dir=packages/vitals-ng/dist" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "Unknown project"
            exit 1
            ;;
        esac

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npx nx build ${{ inputs.project }}

      - name: Publish prerelease
        run: |
          cd ${{ steps.resolve.outputs.dist_dir }}
          npm version prerelease --preid pre --no-git-tag-version
          npm publish --tag=next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
