name: Release

on:
  # only manually triggered
  workflow_dispatch:
    inputs:
      project:
        description: Project to release
        required: true
        type: choice
        options:
          - vitals
          - vitals-ng

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Configure git user for committing and tagging
        run: |
          git config user.email "mags-team@smals.be"
          git config user.name "SMALS Belgium - MAGS team"

      - name: Bundle project
        run: npx nx bundle ${{ inputs.project }}

      - name: Verify package
        run: npx nx run ${{ inputs.project }}:verify-package

      - name: Create release
        run: npx nx release --projects=${{ inputs.project }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
