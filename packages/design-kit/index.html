<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="./src/my-health.css" />

      .red {
        --mh-color-teapot: red;
      }
    </style>

  <body>
    <article>
      <h2>Teapot</h2>
      <mh-teapot></mh-teapot>

      <mh-divider></mh-divider>
      <mh-divider loudness="quiet"></mh-divider>
      <mh-divider loudness="quieter"></mh-divider>
    </article>
