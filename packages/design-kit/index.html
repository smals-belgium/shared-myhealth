<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <base href="/" />

    <title>MyHealth sandbox</title>

    <script type="module">
      document.addEventListener('mh-error', (event) => {
        if (event.error) {
          console.warn(event.message);
          throw event.error;
        } else console.error(event.message);
      });
    </script>

    <script type="module" src="./src/index.ts"></script>

    <link rel="stylesheet" href="./src/my-health.css" />

    <style>
      .red {
        --mh-color-teapot: red;
      }
    </style>
  </head>

  <body>
    <article>
      <h2>Teapot</h2>
      <mh-teapot></mh-teapot>
      <mh-teapot class="red">red</mh-teapot>
    </article>

    <article>
      <h2>Divider</h2>
      <mh-divider loudness="louder"></mh-divider>
      <mh-divider loudness="loud"></mh-divider>
      <mh-divider></mh-divider>
      <mh-divider loudness="quiet"></mh-divider>
      <mh-divider loudness="quieter"></mh-divider>
    </article>

    <article>
      <h2>Icon</h2>
      normal: <mh-icon name="search"></mh-icon><br />
      rotate: <mh-icon name="search" rotate="45"></mh-icon><br />
      custom: <mh-icon id="customIcon" src="./src/icon/svg/add.svg"></mh-icon>
    </article>

    <article>
      <h2>Spinner</h2>
      <mh-spinner lang="es"></mh-spinner>
    </article>
  </body>
</html>
